<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Bio-Data</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="task2-body">

    <div class="form-container center-form">
        <h2>Employee Bio – Data Form</h2>
        
        <form id="bioForm" action="#" method="POST" onsubmit="return validateForm()">
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName">
                <span class="error-msg" id="firstNameError"></span>
            </div>

            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName">
                <span class="error-msg" id="lastNameError"></span>
            </div>

            <div class="form-group">
                <label for="address">Address:</label>
                <input type="text" id="address" name="address">
                <span class="error-msg" id="addressError"></span>
            </div>

            <div class="form-group">
                <label for="email">Email ID:</label>
                <input type="text" id="email" name="email">
                <span class="error-msg" id="emailError"></span>
            </div>

            <div class="form-group">
                <label for="membership">Membership Duration:</label>
                <select id="membership" name="membership">
                    <option value="">-- Select Duration --</option>
                    <option value="1 Year">1 Year</option>
                    <option value="2 Years">2 Years</option>
                    <option value="5 Years">5 Years</option>
                </select>
                <span class="error-msg" id="membershipError"></span>
            </div>

            <div class="btn-group">
                <button type="submit">Submit</button>
                <button type="reset" class="btn-reset" onclick="clearErrors()">Reset</button>
            </div>
        </form>
        
        <div class="nav-link">
            <a href="page1.html">Back to Page 1</a>
        </div>
    </div>

    <script>
        function validateForm() {
            let isValid = true;
            clearErrors();

            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const address = document.getElementById('address').value.trim();
            const email = document.getElementById('email').value.trim();
            const membership = document.getElementById('membership').value;

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (firstName === "") {
                document.getElementById('firstNameError').innerText = "First name is required.";
                isValid = false;
            }

            if (lastName === "") {
                document.getElementById('lastNameError').innerText = "Last name is required.";
                isValid = false;
            }

            if (address === "") {
                document.getElementById('addressError').innerText = "Address is required.";
                isValid = false;
            }

            if (email === "") {
                document.getElementById('emailError').innerText = "Email is required.";
                isValid = false;
            } else if (!emailPattern.test(email)) {
                document.getElementById('emailError').innerText = "Please enter a valid email address.";
                isValid = false;
            }

            if (membership === "") {
                document.getElementById('membershipError').innerText = "Please select a membership option.";
                isValid = false;
            }

            return isValid; 
        }

        function clearErrors() {
            const errorSpans = document.querySelectorAll('.error-msg');
            errorSpans.forEach(span => span.innerText = "");
        }
    </script>
</body>
</html>
